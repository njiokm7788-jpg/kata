name: Katabump Auto Renew

on:
  schedule:
    # 每天北京时间 8:00 运行
    - cron: '0 0 * * *'  
  workflow_dispatch: # 允许点击 Actions 页面上的按钮手动触发，方便调试

jobs:
  renew:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        # cache: 'npm' # 如果你有 package-lock.json，开启缓存会更快
        
    - name: Install Dependencies
      run: |
        npm install
        # 下面这一行会安装运行 Chrome 所需的所有系统依赖（非常稳定）
        npx playwright install-deps chrome
        # 安装 chrome 浏览器本身（如果项目依赖于特定版本的 playwright 浏览器）
        npx playwright install chrome
      
    - name: Run Renew Script
      env:
        # 确保你在 GitHub Repo -> Settings -> Secrets and variables -> Actions 中设置了 USERS_JSON
        USERS_JSON: ${{ secrets.USERS_JSON }}
      run: node renew.js  # <--- ！！！请确保这里指向你的实际脚本文件名
